site_name: Rohith Kumar Prasanna Kumar
site_url: https://rohithkumar.dev
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top

nav:
  - Home: index.md
  - CV: cv.md
  - Contact: contact.md
  - Blog:
    - blog/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/prasro
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/rohith-kumar-prasanna-kumar
      name: LinkedIn

plugins:
  - blog:
      blog_dir: blog
      archive: true
      categories: true
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js